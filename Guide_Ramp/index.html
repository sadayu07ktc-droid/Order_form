<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>คู่มือ · บันทึกผลปาล์มรายวัน (SSB)</title>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --olive:#9a9c56; --olive-d:#7c7e42; --olive-soft:#ecebcf;
    --green:#5fa040; --green-d:#3d6b28; --green-soft:#e9f2e0;
    --oil:#e09f3e; --oil-ink:#9a6a14; --oil-soft:#fff5e4;
    --ink:#2f3a24; --muted:#77806a; --line:#e6e6d4; --card:#fff;
    --danger:#b23a2e; --cream:#f7f4e8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:"Sarabun",sans-serif;color:var(--ink);
    background:linear-gradient(160deg,#f2efe0,#e7ecd8);
    display:flex;flex-direction:column;overflow:hidden;-webkit-text-size-adjust:100%}
  .app{max-width:560px;width:100%;margin:0 auto;flex:1;display:flex;flex-direction:column;
    height:100dvh;padding:env(safe-area-inset-top) 0 0}

  /* ---- Top bar ---- */
  .top{display:flex;align-items:center;gap:12px;padding:12px 16px 8px}
  .brand{display:flex;align-items:center;gap:9px;font-family:"Anuphan";font-weight:700;color:var(--olive-d)}
  .brand .b-logo{width:34px;height:34px;border-radius:10px;background:var(--olive);display:grid;place-items:center;font-size:18px;color:#fff}
  .brand small{display:block;font-size:.62rem;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-top:-2px}
  .top .spacer{flex:1}
  .vbtn{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:7px 12px;
    font-family:"Anuphan";font-weight:700;font-size:.8rem;color:var(--green-d);cursor:pointer;display:flex;align-items:center;gap:5px}
  .vbtn.on{background:var(--green);border-color:var(--green);color:#fff}

  .progress{height:5px;background:var(--olive-soft);border-radius:4px;margin:2px 16px 0;overflow:hidden}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--olive));
    border-radius:4px;transition:width .35s ease;width:0}
  .pnum{font-size:.72rem;color:var(--muted);text-align:center;margin-top:5px;font-weight:600}

  /* ---- Stage ---- */
  .stage{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 16px 8px}
  .page{background:var(--card);border-radius:22px;box-shadow:0 8px 26px rgba(60,70,40,.1);
    padding:26px 20px 24px;min-height:100%;display:flex;flex-direction:column;
    animation:slidein .32s cubic-bezier(.2,.8,.2,1)}
  @keyframes slidein{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  .page.back{animation:slideinB .32s cubic-bezier(.2,.8,.2,1)}
  @keyframes slideinB{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:none}}

  .p-ic{width:88px;height:88px;border-radius:24px;display:grid;place-items:center;font-size:46px;
    margin:4px auto 14px;background:var(--green-soft);box-shadow:inset 0 0 0 2px #d5e6c8}
  .p-ic.oil{background:var(--oil-soft);box-shadow:inset 0 0 0 2px #eecfa0}
  .p-ic.olive{background:var(--olive-soft);box-shadow:inset 0 0 0 2px #dcdcae}

  /* ---- ภาพหน้าจอจริง + วงชี้ ---- */
  .shot{position:relative;margin:6px 0 14px;border-radius:14px;overflow:hidden;
    box-shadow:0 4px 16px rgba(60,70,40,.14);border:1px solid var(--line)}
  .shot img{width:100%;display:block}
  .shot img.noimg{min-height:150px;background:repeating-linear-gradient(45deg,#f1efe0,#f1efe0 10px,#e9e7d6 10px,#e9e7d6 20px)}
  .mk-ring{position:absolute;border:3.5px solid #e11d1d;border-radius:10px;
    box-shadow:0 0 0 3px rgba(225,29,29,.20),0 2px 8px rgba(225,29,29,.35);
    animation:mkpulse 1.3s infinite;pointer-events:none}
  @keyframes mkpulse{0%,100%{box-shadow:0 0 0 3px rgba(225,29,29,.20),0 2px 8px rgba(225,29,29,.35)}
    50%{box-shadow:0 0 0 7px rgba(225,29,29,.08),0 2px 10px rgba(225,29,29,.45)}}
  .mk-arrow{position:absolute;font-size:2rem;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));
    animation:mkpoint 1s infinite;pointer-events:none}
  @keyframes mkpoint{0%,100%{transform:translate(0,0)}50%{transform:translate(-7px,-7px)}}
  .p-step{text-align:center;font-family:"Anuphan";font-weight:700;font-size:.8rem;color:var(--green);
    letter-spacing:.5px;text-transform:uppercase}
  .p-title{text-align:center;font-family:"Anuphan";font-weight:700;font-size:1.42rem;color:var(--green-d);
    line-height:1.25;margin:3px 0 12px}
  .p-body{font-size:1rem;color:#3c4531;line-height:1.65}
  .p-body p{margin:8px 0}
  .p-body b{color:var(--green-d)}

  .btn-demo{display:inline-flex;align-items:center;gap:6px;background:var(--oil);color:#fff;
    font-family:"Anuphan";font-weight:700;border-radius:12px;padding:9px 16px;margin:4px 2px;font-size:.98rem;box-shadow:0 3px 10px rgba(224,159,62,.3)}
  .btn-demo.green{background:var(--green)}
  .btn-demo.olive{background:var(--olive)}
  .btn-demo.dark{background:var(--green-d)}

  .callout{border-radius:14px;padding:13px 15px;margin:14px 0 2px;font-size:.94rem;display:flex;gap:10px;align-items:flex-start}
  .callout .ci{font-size:1.3rem;flex:0 0 auto;line-height:1.2}
  .callout.tip{background:var(--green-soft);border:1px solid #cfe6bd}
  .callout.warn{background:var(--oil-soft);border:1px solid #eac98f}
  .callout.info{background:#eef2f8;border:1px solid #cdd9ea}
  .callout b{color:var(--green-d)}

  ul.chk{list-style:none;margin:6px 0}
  ul.chk li{padding:6px 0 6px 26px;position:relative;font-size:.96rem}
  ul.chk li::before{content:"✓";position:absolute;left:0;top:5px;color:var(--green);font-weight:700;font-size:1.05rem}

  .field-demo{background:#fbfcf8;border:1.5px solid var(--line);border-radius:12px;padding:10px 13px;margin:8px 0;
    display:flex;justify-content:space-between;align-items:center;font-size:.95rem}
  .field-demo .lb{color:var(--muted);font-weight:600}
  .field-demo .vl{font-family:"Anuphan";font-weight:700;color:var(--ink)}
  .field-demo.calc{background:var(--green-soft);border-style:dashed;border-color:#bcd9a8}
  .field-demo.focus{background:var(--oil-soft);border:2px solid var(--oil)}
  .field-demo.focus .vl{color:var(--oil-ink);font-size:1.3rem}

  .chips{display:flex;gap:8px;margin:8px 0}
  .chip{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;
    font-family:"Anuphan";font-weight:700;background:#fff}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
  .chip.wide{width:auto;border-radius:23px;padding:0 16px}

  /* ---- Cover ---- */
  .cover{align-items:center;justify-content:center;text-align:center;
    background:linear-gradient(160deg,var(--green-d),var(--olive-d));color:#fff}
  .cover .p-ic{background:rgba(255,255,255,.15);box-shadow:inset 0 0 0 2px rgba(255,255,255,.4);width:100px;height:100px;font-size:54px}
  .cover .p-title{color:#fff;font-size:1.7rem}
  .cover .c-sub{opacity:.9;font-size:1rem;margin-top:2px}
  .cover .c-brand{margin-top:22px;font-size:.85rem;opacity:.85;line-height:1.5}
  .cover .c-hint{margin-top:20px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);
    border-radius:20px;padding:8px 18px;font-size:.9rem;font-weight:600}

  /* ---- Nav ---- */
  .nav{display:flex;gap:10px;padding:12px 16px calc(14px + env(safe-area-inset-bottom))}
  .nav button{flex:1;font-family:"Anuphan";font-weight:700;font-size:1.05rem;border:none;border-radius:14px;
    padding:14px;cursor:pointer;transition:.12s}
  .nav .prev{flex:0 0 30%;background:#fff;border:1.5px solid var(--line);color:var(--muted)}
  .nav .next{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;box-shadow:0 4px 14px rgba(61,107,40,.3)}
  .nav .next.done{background:linear-gradient(135deg,var(--oil),#c9821f)}
  .nav button:active{transform:scale(.98)}
  .nav .prev:disabled{opacity:.4;cursor:default}

  .dots{display:flex;gap:6px;justify-content:center;padding:0 0 6px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--olive-soft);transition:.2s}
  .dot.on{background:var(--green);width:20px;border-radius:4px}

  .lineWarn{display:none;align-items:center;gap:8px;background:#fff3d6;border-bottom:1px solid #eac98f;
    padding:9px 14px;font-size:.82rem;color:#8a5a12;font-weight:600}
  .lineWarn.show{display:flex}
  .lineWarn span{flex:1;line-height:1.4}
  .lineWarn button{flex:0 0 auto;background:var(--oil);color:#fff;border:none;border-radius:16px;
    padding:7px 12px;font-family:"Anuphan",sans-serif;font-weight:700;font-size:.8rem;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <div class="lineWarn" id="lineWarn">
    <span>🔊 ในแอป LINE ไม่มีเสียงอ่าน — เปิดในเบราว์เซอร์เพื่อฟัง AI</span>
    <button id="openExt">เปิดในเบราว์เซอร์ ›</button>
  </div>
  <div class="top">
    <div class="brand"><span class="b-logo">🌴</span><span>SSB<small>บันทึกผลปาล์มรายวัน</small></span></div>
    <span class="spacer"></span>
    <button class="vbtn" id="voiceBtn">🔊 <span id="voiceLabel">เปิดเสียง</span></button>
  </div>
  <div class="progress"><i id="bar"></i></div>
  <div class="pnum" id="pnum">1 / 1</div>

  <div class="stage" id="stage"></div>

  <div class="dots" id="dots"></div>
  <div class="nav">
    <button class="prev" id="prev">‹ ย้อนกลับ</button>
    <button class="next" id="next">ถัดไป ›</button>
  </div>
</div>

<script>
/* ================= เนื้อหาคู่มือ (ทีละหน้า) ================= */
const PAGES = [
  {
    cover:true, icon:"🌴",
    title:"บันทึกผลปาล์มรายวัน",
    html:`<div class="c-sub">คู่มือใช้งานสำหรับลานเท</div>
          <div class="c-brand">บริษัท สุขสมบูรณ์น้ำมันปาล์ม จำกัด<br>SSB Smart Supply · Transport Service</div>
          <div class="c-hint">กด “ถัดไป” เพื่อเริ่ม · แตะ 🔊 ให้ AI อ่านให้ฟัง</div>`,
    voice:"ยินดีต้อนรับสู่คู่มือการบันทึกผลปาล์มรายวัน สำหรับลานเท ของบริษัท สุขสมบูรณ์น้ำมันปาล์ม จำกัด กดปุ่มถัดไปเพื่อเริ่มต้น หรือแตะปุ่มลำโพงเพื่อให้อ่านให้ฟังได้เลย"
  },
  {
    step:"ขั้นที่ 1", ic:"olive", icon:"📱",
    title:"เข้าแอปจากริชเมนู",
    shot:{ img:"richmenu.png",
      mark:[{l:3,t:60,w:26,h:34, arrow:{l:11,t:44,ic:"👇"}}] },
    html:`<p>เปิด <b>LINE</b> ห้องของ SSB แล้วแตะริชเมนู <b>“แจ้งรับงานขนส่ง”</b> (วงแดง)</p>
          <p>ระบบจะเปิดแอป <b>SSB Smart Supply</b> ขึ้นมา</p>`,
    voice:"ขั้นที่ 1 เปิดไลน์ห้องของ เอส เอส บี แล้วแตะริชเมนู แจ้งรับงานขนส่ง ตรงวงแดง ระบบจะเปิดแอปขึ้นมา"
  },
  {
    step:"ขั้นที่ 2", ic:"green", icon:"🌴",
    title:"กดปุ่มบันทึกผลปาล์ม",
    shot:{ img:"enter-app.png",
      mark:[{l:69,t:2,w:29,h:44, arrow:{l:60,t:48,ic:"👆"}}] },
    html:`<p>ที่ <b>มุมขวาบน</b> แตะปุ่ม <b>“🌴 บันทึกผลปาล์มรายวัน”</b> (วงแดง)</p>
          <div class="callout info"><span class="ci">🔒</span><div>ปุ่มนี้เห็น<b>เฉพาะลานเท</b> — พอกดจะเข้าฟอร์ม และ<b>ล็อกลานของคุณ</b>ให้อัตโนมัติ</div></div>`,
    voice:"ขั้นที่ 2 ที่มุมขวาบน แตะปุ่ม บันทึกผลปาล์มรายวัน ตรงวงแดง ปุ่มนี้เห็นเฉพาะลานเท พอกดจะเข้าฟอร์ม และล็อกลานของคุณให้อัตโนมัติ"
  },
  {
    step:"ขั้นที่ 3", ic:"green", icon:"✍️",
    title:"กรอกข้อมูลทั่วไป",
    shot:{ img:"form-general.png",
      mark:[{l:75,t:2,w:23,h:17, arrow:{l:66,t:20,ic:"👆"}}] },
    html:`<ul class="chk">
            <li><b>วันที่</b> — ตั้งเป็นวันนี้ให้แล้ว</li>
            <li><b>ลาน</b> — ล็อกเป็นลานคุณอัตโนมัติ</li>
            <li><b>ผู้บันทึก</b> — พิมพ์ชื่อคุณ</li>
          </ul>
          <div class="callout tip"><span class="ci">↩️</span><div>กดปุ่ม <b>“↓ ดึงยอดยกมา”</b> (วงแดง) ระบบดึง <b>คงเหลือเมื่อวาน</b> มาใส่ค้างลานให้เอง</div></div>`,
    voice:"ขั้นที่ 3 กรอกข้อมูลทั่วไป วันที่ตั้งเป็นวันนี้ให้แล้ว ลานล็อกเป็นลานคุณอัตโนมัติ พิมพ์ชื่อผู้บันทึก แล้วกดปุ่มดึงยอดยกมา ตรงวงแดง ระบบจะดึงคงเหลือเมื่อวานมาใส่ค้างลานให้เอง"
  },
  {
    step:"ขั้นที่ 4", ic:"green", icon:"📥",
    title:"กรอกยอดรับเข้า",
    shot:{ img:"form-in.png",
      mark:[{l:73,t:41,w:25,h:11, arrow:{l:62,t:55,ic:"👆"}}] },
    html:`<ul class="chk">
            <li>พิมพ์ <b>ซื้อ A</b> / ซื้อ B / RSPO (ถ้ามี)</li>
            <li>ช่อง <b>ซื้อรวม · รวม</b> ระบบคิดให้ (เส้นประเขียว)</li>
          </ul>
          <div class="callout warn"><span class="ci">➕</span><div><b>มีปุ่มซ่อน!</b> วันไหนมี<b>ซื้อบริษัท</b> ให้กดปุ่ม
          <span class="btn-demo green" style="font-size:.85rem;padding:4px 10px">＋ ซื้อบริษัท</span> (วงแดง) ช่องกรอกถึงจะโผล่มา</div></div>`,
    voice:"ขั้นที่ 4 กรอกยอดรับเข้า พิมพ์ซื้อเอ ซื้อบี และ อาร์ เอส พี โอ ถ้ามี ช่องซื้อรวมกับรวม ระบบคิดให้ ข้อควรรู้ มีปุ่มซ่อน วันไหนมีซื้อบริษัท ให้กดปุ่ม เพิ่มซื้อบริษัท ตรงวงแดง ช่องกรอกถึงจะโผล่มา ถ้าไม่กดจะไม่เห็นช่อง"
  },
  {
    step:"ขั้นที่ 5", ic:"green", icon:"📤",
    title:"กรอกยอดส่งออก",
    shot:{ img:"form-out.png",
      mark:[{l:75,t:2,w:23,h:14, arrow:{l:66,t:19,ic:"👆"}}] },
    html:`<ul class="chk">
            <li>พิมพ์ <b>ส่งโรงงาน (หนองใหญ่)</b> + จำนวนเที่ยว</li>
            <li>มีคัดปาล์มดิบ → กรอกทะลาย + รถกี่คัน</li>
            <li>ช่อง <b>ส่งรวม</b> ระบบบวกให้เอง</li>
          </ul>
          <div class="callout warn"><span class="ci">➕</span><div><b>มีปุ่มซ่อน!</b> วันไหน<b>ส่งบ่อไร่</b>ด้วย ให้กดปุ่ม
          <span class="btn-demo olive" style="font-size:.85rem;padding:4px 10px">＋ ส่งบ่อไร่</span> (วงแดง) ช่องกรอกถึงจะโผล่มา</div></div>`,
    voice:"ขั้นที่ 5 กรอกยอดส่งออก พิมพ์ส่งโรงงานหนองใหญ่ และจำนวนเที่ยว ถ้ามีคัดปาล์มดิบก็กรอก ช่องส่งรวมระบบบวกให้เอง ข้อควรรู้ มีปุ่มซ่อน วันไหนส่งบ่อไร่ด้วย ให้กดปุ่ม เพิ่มส่งบ่อไร่ ตรงวงแดง ช่องกรอกถึงจะโผล่มา"
  },
  {
    step:"ขั้นที่ 6", ic:"oil", icon:"⚖️",
    title:"ปิดยอด · คงค้าง",
    shot:{ img:"form-top.png",
      mark:[{l:50,t:28,w:48,h:50, arrow:{l:40,t:8,ic:"👉"}}] },
    html:`<p><b>คงค้าง</b> (การ์ดสีส้ม วงแดง) = ยอดที่เหลือ ยกไปวันพรุ่งนี้ ระบบคิดให้</p>
          <div class="callout warn"><span class="ci">⚖️</span><div>ถ้า<b>ชั่งจริง</b>ได้ ใส่ช่อง “คงเหลือจริง” ระบบคิดน้ำหนักหายให้<br>
          ถ้าใส่ <b>0</b> = วันหมดลาน (ล้างลาน) → ดูขั้นถัดไป</div></div>`,
    voice:"ขั้นที่ 6 ปิดยอด ช่องคงค้าง การ์ดสีส้มตรงวงแดง คือยอดที่เหลือยกไปวันพรุ่งนี้ ระบบคิดให้ ถ้าชั่งจริงได้ให้ใส่ช่องคงเหลือจริง ถ้าใส่ศูนย์ แปลว่าวันหมดลาน หรือล้างลาน"
  },
  {
    step:"ขั้นที่ 7", ic:"oil", icon:"🛻",
    title:"แจ้งรถรับปาล์ม",
    shot:{ img:"pickup.png",
      mark:[{l:4,t:30,w:56,h:22, arrow:{l:14,t:8,ic:"👇"}}] },

/* ================= ระบบสไลด์ ================= */
let idx=0, dir=1;
const stage=document.getElementById("stage"), bar=document.getElementById("bar"),
      pnum=document.getElementById("pnum"), dots=document.getElementById("dots"),
      prevB=document.getElementById("prev"), nextB=document.getElementById("next");

function shotHTML(s){
  if(!s)return "";
  const ov=(s.mark||[]).map(m=>{
    let h=`<div class="mk-ring" style="left:${m.l}%;top:${m.t}%;width:${m.w}%;height:${m.h}%"></div>`;
    if(m.arrow)h+=`<div class="mk-arrow" style="left:${m.arrow.l}%;top:${m.arrow.t}%">${m.arrow.ic||"👉"}</div>`;
    return h;
  }).join("");
  return `<div class="shot"><img src="${s.img}" alt="ภาพตัวอย่าง" onerror="this.classList.add('noimg')"/>${ov}</div>`;
}

function render(){
  const p=PAGES[idx];
  const cover=p.cover?" cover":"";
  const icClass=p.ic?(" "+p.ic):"";
  const head=p.cover?"":`<div class="p-step">${p.step||""}</div>`;
  const visual=p.cover
    ? `<div class="p-ic${icClass}">${p.icon||"🌴"}</div>`
    : (p.shot ? shotHTML(p.shot) : `<div class="p-ic${icClass}">${p.icon||"🌴"}</div>`);
  stage.innerHTML=`<div class="page${cover}${dir<0?' back':''}">
      ${p.cover?visual:head}
      ${p.cover?"":visual}
      <div class="p-title">${p.title}</div>
      <div class="p-body">${p.html||""}</div>
    </div>`;
  bar.style.width=((idx+1)/PAGES.length*100)+"%";
  pnum.textContent=(idx+1)+" / "+PAGES.length;
  prevB.disabled=idx===0;
  const last=idx===PAGES.length-1;
  nextB.textContent=last?"เริ่มใหม่ ↻":"ถัดไป ›";
  nextB.classList.toggle("done",last);
  dots.innerHTML=PAGES.map((_,i)=>`<span class="dot${i===idx?' on':''}"></span>`).join("");
  stage.scrollTop=0;
  if(voiceOn) speak(p.voice||stripHtml(p.title));
}
function stripHtml(s){const d=document.createElement("div");d.innerHTML=s;return d.textContent||"";}

function go(n){
  const t=idx+n;
  if(t<0)return;
  if(t>=PAGES.length){ idx=0; dir=1; render(); return; }  // เริ่มใหม่
  dir=n; idx=t; render();
}
prevB.onclick=()=>go(-1);
nextB.onclick=()=>go(1);

/* ปัดซ้าย-ขวา */
let tx=0;
stage.addEventListener("touchstart",e=>tx=e.touches[0].clientX,{passive:true});
stage.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>60){ dx<0?go(1):go(-1); }
},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1);});

/* ================= AI อ่านออกเสียง (Web Speech) ================= */
let voiceOn=false, thVoice=null;
const synth=window.speechSynthesis;
function pickVoice(){
  if(!synth)return;
  const vs=synth.getVoices();
  thVoice=vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith("th"))||null;
}
if(synth){ pickVoice(); synth.onvoiceschanged=pickVoice; }

function speak(text){
  if(!synth||!text)return;
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="th-TH"; u.rate=1.0; u.pitch=1.0;
  if(thVoice)u.voice=thVoice;
  synth.speak(u);
}
const voiceBtn=document.getElementById("voiceBtn"), voiceLabel=document.getElementById("voiceLabel");
voiceBtn.onclick=()=>{
  if(!synth){alert("อุปกรณ์นี้อ่านออกเสียงไม่ได้ (ลองเปิดใน Chrome/Safari)");return;}
  voiceOn=!voiceOn;
  voiceBtn.classList.toggle("on",voiceOn);
  voiceLabel.textContent=voiceOn?"ปิดเสียง":"เปิดเสียง";
  if(voiceOn){ pickVoice(); speak(PAGES[idx].voice||""); }
  else synth.cancel();
};

render();

/* ===== ตรวจจับแอป LINE → แนะนำเปิดในเบราว์เซอร์ (เพื่อให้มีเสียง AI) ===== */
(function(){
  const ua=navigator.userAgent||"";
  const inLine=/Line\//i.test(ua);                 // อยู่ใน in-app browser ของ LINE
  const warn=document.getElementById("lineWarn"), openExt=document.getElementById("openExt");
  if(inLine){
    warn.classList.add("show");
    openExt.onclick=()=>{
      // เพิ่มพารามิเตอร์ให้ LINE เปิดออกเบราว์เซอร์ภายนอก
      const u=new URL(location.href);
      u.searchParams.set("openExternalBrowser","1");
      location.href=u.toString();
    };
  }
})();
</script>
